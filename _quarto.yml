project:
  type: website
  output-dir: docs
  execute-dir: project

# --- Website Navigation (Keeps your online dashboard intact) ---
website:
  title: "STYCS P-Kinetics Manuscript"
  navbar:
    left:
      - href: index.html
        text: "Manuscript"
      - href: presentation/index.html
        text: "Presentation"
  sidebar:
    - title: "Data & Models"
      style: "docked"
      background: light
      contents:
        - notebooks/pretest.qmd
        - notebooks/coefficient_analysis.qmd
        - notebooks/mlr3.qmd
        - notebooks/results.qmd

# --- Top-level settings ---
bibliography: references.bib
csl: apa.csl

# --- Format-specific settings ---
format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    html-math-method: mathjax
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 250px

  docx:
    toc: false # Journals usually don't want TOCs in the Word manuscript
    number-sections: true

  pdf:
    documentclass: article
    papersize: a4
    pdf-engine: lualatex
    number-sections: true
    mainfont: "Latin Modern Roman"
    sansfont: "Latin Modern Sans"
    monofont: "Latin Modern Mono"
    colorlinks: true
    geometry:
      - top=25mm
      - left=25mm
      - right=25mm
      - bottom=25mm
    # Clean, standard academic headers instead of the thesis title page