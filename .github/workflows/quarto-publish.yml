name: Quarto Publish Manuscript

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push the rendered site to the gh-pages branch

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R Dependencies
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "knitr", "nlme", "dplyr", "ggplot2", "tidyr","multcomp","car","lme4","ggplot2","ggtext","ggpmisc","latex2exp","kableExtra","broom","MuMIn","mlr3tuning","mlr3verse","lgr","readr","performance","report","sjmisc","sjPlot"))'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX (for LuaLaTeX PDF rendering)
        run: quarto tools install tinytex

      - name: Render and Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}